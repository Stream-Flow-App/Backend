openapi: 3.0.3
info:
  title: Stream Flow API
  version: 1.0.0
  description: >
    Official Stream Flow API documentation. Covers user authentication, audio streaming, playlist management, moderation, and admin controls.
servers:
  - url: /api
    description: Base API Path

tags:
  - name: Auth
    description: User authentication and password management
  - name: Audio
    description: Audio upload, streaming, and listen analytics
  - name: Playlist
    description: Curated collections of audio tracks
  - name: Applications
    description: Artist verification applications
  - name: Moderation
    description: Approval workflow for audio uploads
  - name: Notifications
    description: In-app user notifications
  - name: Admin
    description: High-level administration controls

paths:
  /users/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a user account and returns an access token.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Validation error or Email in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/login:
    post:
      tags: [Auth]
      summary: Login user
      description: Authenticates user via email/username and sets a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/forget-password:
    post:
      tags: [Auth]
      summary: Initiate password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset link sent
        '404':
          description: User not found

  /users/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid token or same old password

  /users/change-password:
    put:
      tags: [Auth]
      summary: Change password (In-App)
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Incorrect current password
        '401':
          description: Not authenticated

  /users/logout:
    get:
      tags: [Auth]
      summary: Logout current session
      responses:
        '200':
          description: Logged out successfully

  /users/profile/playback:
    put:
      tags: [Auth]
      summary: Sync cross-device playback state
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [songId, currentTime]
              properties:
                songId:
                  type: string
                currentTime:
                  type: number
      responses:
        '200':
          description: Playback state synced
        '401':
          description: Not authenticated

  /audio/upload:
    post:
      tags: [Audio]
      summary: Upload new audio track
      description: Uploads mp3/wav and cover image to Cloudinary. Must be authenticated.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AudioUpload'
      responses:
        '201':
          description: Audio uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  audio:
                    $ref: '#/components/schemas/AudioResponse'
        '400':
          description: Validation error or missing files
        '401':
          description: Not authenticated

  /audio/search:
    get:
      tags: [Audio]
      summary: Global unified search
      description: Searches across Audios, Playlists, Users, and Albums concurrently.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: genre
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: artist
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'
        '400':
          description: Search query missing

  /audio/{id}/listen:
    post:
      tags: [Audio]
      summary: Increment listen times analytics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                listenedSeconds:
                  type: number
                  default: 0
      responses:
        '200':
          description: Listen time incremented
        '404':
          description: Audio not found

  /audio/grouped-by-artist:
    get:
      tags: [Audio]
      summary: Get Audios Grouped By Artist
      responses:
        '200':
          description: Grouped list of audios

  /playlists:
    get:
      tags: [Playlist]
      summary: Get all playlists for current user
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: User playlists retrieved
    post:
      tags: [Playlist]
      summary: Create a new playlist
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                isPublic:
                  type: boolean
                isAlbum:
                  type: boolean
                audio:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Playlist created
        '400':
          description: Playlist name missing

  /playlists/{id}:
    get:
      tags: [Playlist]
      summary: Get playlist by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist retrieved
        '403':
          description: Not authorized to view
        '404':
          description: Playlist not found

  /playlists/{id}/songs:
    post:
      tags: [Playlist]
      summary: Add song to playlist
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [songId]
              properties:
                songId:
                  type: string
      responses:
        '200':
          description: Song added
        '400':
          description: Song already exists
        '403':
          description: Not authorized

  /playlists/{id}/songs/{songId}:
    delete:
      tags: [Playlist]
      summary: Remove song from playlist
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: songId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Song removed
        '400':
          description: Invalid IDs

  /applications/apply:
    post:
      tags: [Applications]
      summary: Submit Artist Application
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bio]
              properties:
                bio:
                  type: string
                  minLength: 20
                socialLinks:
                  type: object
                portfolioLinks:
                  type: object
      responses:
        '201':
          description: Application submitted
        '400':
          description: Already applied

  /moderation/audios/pending:
    get:
      tags: [Moderation]
      summary: Get Pending Audios
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Pending audios retrieved

  /moderation/audios/{id}/status:
    put:
      tags: [Moderation]
      summary: Update Audio Status
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [approved, pending, rejected]
      responses:
        '200':
          description: Status updated
        '400':
          description: Invalid status

  /notifications:
    get:
      tags: [Notifications]
      summary: Get My Notifications
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: List of notifications

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Notifications marked read

  /admin/users/{username}/ban:
    put:
      tags: [Admin]
      summary: Ban or Suspend User
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [durationHours]
              properties:
                durationHours:
                  type: string
                  example: "24"
      responses:
        '200':
          description: User ban status updated

  /admin/users/{username}/role:
    put:
      tags: [Admin]
      summary: Update User Role
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [user, artist, moderator, admin]
      responses:
        '200':
          description: User role updated

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              msg:
                type: string

    AuthSuccessResponse:
      type: object
      properties:
        message:
          type: string
        result:
          type: integer
        metadata:
          type: object
          properties:
            accessToken:
              type: string
        data:
          type: object

    UserRegister:
      type: object
      required: [name, username, email, password]
      properties:
        name:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        profileImg:
          type: string
          format: binary

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        remember:
          type: boolean

    AudioUpload:
      type: object
      required: [title, genre, duration, singer, audio, cover]
      properties:
        title:
          type: string
        genre:
          type: string
        category:
          type: string
          enum: [song, podcast, audiobook]
        duration:
          type: number
        singer:
          type: string
        isPrivate:
          type: boolean
        audio:
          type: string
          format: binary
        cover:
          type: string
          format: binary

    AudioResponse:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        genre:
          type: string
        audioUrl:
          type: string
        coverImageUrl:
          type: string
        listenTimes:
          type: number
        totalListenSeconds:
          type: number

    SearchResults:
      type: object
      properties:
        audios:
          type: array
          items:
            type: object
        playlists:
          type: array
          items:
            type: object
        users:
          type: array
          items:
            type: object
        albums:
          type: array
          items:
            type: string
        totalAudios:
          type: integer
        totalPlaylists:
          type: integer
        totalUsers:
          type: integer
        totalAlbums:
          type: integer
        currentPage:
          type: integer
        totalPages:
          type: integer

